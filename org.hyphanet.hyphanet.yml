app-id: org.hyphanet.hyphanet
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: w-hyphanet

finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --share=network
  - --env=PATH=/app/jre/bin:/usr/bin:/app/bin
  - --persist=hyphanet

add-extensions:
  org.freedesktop.Sdk.Extension.openjdk17:
    version: '25.08'
    directory: jdk

modules:
  - name: jre
    buildsystem: simple
    build-commands:
      - mkdir -p /app/jdk
      - ln -s jdk/jvm/openjdk-17 /app/jre

  - name: hyphanet
    buildsystem: simple
    build-commands:
      - mkdir /app/bin
      - cp -r ./* /app/bin/
    sources:
      - type: file
        url: https://www.draketo.de/dateien/freenet/build01506/new_installer_offline_1506.jar
        sha256: 0de48192c5ac61c0e3fae4b560bdb032c67191aed6eefeec130ef01d67af6e08

  - name: wrap-hyphanet
    buildsystem: simple
    build-commands:
      - install -Dm755 --target-directory=/app/bin w-hyphanet
    sources:
      - type: script
        dest-filename: w-hyphanet
        commands: 
          - exec ~/hyphanet/bin/browse.sh



